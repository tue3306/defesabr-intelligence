<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="DefesaBR Intelligence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15191e"/>
      <stop offset="0.55" stop-color="#1c2128"/>
      <stop offset="1" stop-color="#232a33"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5c616a"/>
      <stop offset="1" stop-color="#393d44"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faixa de acento (verde · ouro · grafite) -->
  <rect x="0" y="0" width="400" height="6" fill="#2e7d46"/>
  <rect x="400" y="0" width="400" height="6" fill="#caa733"/>
  <rect x="800" y="0" width="400" height="6" fill="#475569"/>

  <!-- logo -->
  <g transform="translate(96,150)">
    <rect width="84" height="84" rx="20" fill="url(#badge)"/>
    <path d="M42 16l24 8v17.5c0 15.2-10.2 29-24 33.5-13.8-4.5-24-18.3-24-33.5V24l24-8z" fill="none" stroke="#e0c25a" stroke-width="6" stroke-linejoin="round"/>
    <rect x="14" y="76" width="56" height="6" rx="3" fill="#caa733"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="188" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="-0.5">DefesaBR</text>
  <text x="200" y="220" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#caa733" letter-spacing="6">INTELLIGENCE</text>

  <!-- título -->
  <text x="96" y="350" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Inteligência estratégica,</text>
  <text x="96" y="424" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" letter-spacing="-1.5"><tspan fill="#ffffff">riscos e </tspan><tspan fill="#caa733">apoio à decisão</tspan><tspan fill="#ffffff">.</tspan></text>

  <!-- subtítulo -->
  <text x="96" y="486" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500" fill="#a4a9b1">Clipping por IA · cenários · indicadores · dashboards — contexto brasileiro.</text>

  <!-- rodapé -->
  <text x="96" y="566" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7d828b">Plataforma demonstrativa · 100% front-end · dados ilustrativos</text>
</svg>
