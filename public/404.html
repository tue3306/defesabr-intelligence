<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Página não encontrada — DefesaBR Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="/defesabr-intelligence/favicon.svg" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f8fa;
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 480px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 1px 3px rgba(16, 18, 22, 0.06);
        padding: 40px 32px;
        text-align: center;
      }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 20px;
        display: grid; place-items: center;
        border-radius: 14px;
        background: linear-gradient(135deg, #5c616a, #393d44);
      }
      .code { font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #a98a23; }
      h1 { margin: 8px 0 6px; font-size: 22px; letter-spacing: -0.02em; }
      p { margin: 0 0 24px; color: #4b5563; line-height: 1.55; font-size: 15px; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        background: #caa733; color: #15191e;
        font-weight: 600; font-size: 14px;
        padding: 10px 18px; border-radius: 10px;
        text-decoration: none; transition: background .15s ease;
      }
      .btn:hover { background: #e0c25a; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e0c25a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <p class="code">Erro 404</p>
      <h1>Página não encontrada</h1>
      <p>O endereço acessado não existe ou foi movido. Volte ao painel para continuar a navegação.</p>
      <a class="btn" href="/defesabr-intelligence/">Voltar ao início</a>
    </main>
  </body>
</html>
